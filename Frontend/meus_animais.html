<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdotaPet - Meus Animais Cadastrados</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        site: {
                            green: '#93b082',       /* Verde oliva do fundo principal */
                            lightgreen: '#c3d3ba',  /* Verde pastel dos containers */
                            coral: '#f37676',       /* Coral/Salmão dos botões de ação */
                            'coral-hover': '#e26363',
                            dark: '#2d3748'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        fredoka: ['Fredoka', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style>
        .smooth-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #93b082;
        }
        ::-webkit-scrollbar-thumb {
            background: #c3d3ba;
            border-radius: 4px;
        }
    </style>
</head>
<body class="bg-site-green font-sans min-h-screen text-slate-800 flex flex-col">

    <header class="bg-site-green border-b border-site-lightgreen/30 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between relative">
            <div class="flex items-center gap-6">
                <a href="pagina_explorar.html" class="font-fredoka text-xl font-medium text-white/80 hover:text-white pb-1 smooth-transition">
                    Explorar pets
                </a>
                <a href="meus_animais.html" class="font-fredoka text-xl font-medium text-white border-b-2 border-white pb-1 smooth-transition">
                    Meus pets
                </a>
                <a href="#" class="font-fredoka text-xl font-medium text-white/80 hover:text-white pb-1 smooth-transition">
                    Mensagens
                </a>
            </div>
            
            <div class="relative">
                <button id="user-menu-btn" class="flex items-center gap-2 text-white font-fredoka text-base focus:outline-none hover:opacity-90 transition-opacity">
                    <div class="w-8 h-8 rounded-full bg-white/20 border border-white flex items-center justify-center overflow-hidden">
                        <span id="header-avatar-initials" class="text-xs font-sans font-bold">U</span>
                    </div>
                    <span id="header-user-name">Usuário</span>
                    <i id="user-menu-arrow" class="fa-solid fa-chevron-down text-xs smooth-transition"></i>
                </button>

                <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-lg border border-site-lightgreen/30 overflow-hidden font-fredoka py-1 z-50 text-sm">
                    <a href="Perfil_Dashboard.html" class="flex items-center gap-2 px-4 py-2.5 text-gray-700 hover:bg-site-lightgreen/10 transition-colors">
                        <i class="fa-solid fa-user opacity-70"></i> Meu Perfil
                    </a>
                    <a href="meus_animais.html" class="flex items-center gap-2 px-4 py-2.5 text-gray-700 bg-slate-50 font-semibold hover:bg-site-lightgreen/20 transition-colors">
                        <i class="fa-solid fa-paw opacity-70"></i> Meus Animais Cadastrados
                    </a>
                    <hr class="border-gray-100 my-1">
                    <button id="btn-logout" class="w-full flex items-center gap-2 px-4 py-2.5 text-red-600 hover:bg-red-50 transition-colors text-left">
                        <i class="fa-solid fa-arrow-right-from-bracket opacity-80"></i> Sair
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-grow w-full">
        <div class="bg-site-lightgreen rounded-3xl p-6 sm:p-8 shadow-sm min-h-[400px]">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-white/20 pb-4 mb-6 gap-4">
                <div>
                    <h2 class="font-fredoka text-2xl font-bold text-slate-900">
                        Meus Animais Cadastrados
                    </h2>
                    <p class="text-slate-700 text-sm mt-1">Gerencie os amiguinhos que você disponibilizou para adoção.</p>
                </div>
                <a href="Perfil_Dashboard.html" class="inline-flex items-center justify-center gap-2 bg-site-coral hover:bg-site-coral-hover text-white font-fredoka px-5 py-2.5 rounded-2xl smooth-transition shadow-sm">
                    <i class="fa-solid fa-plus text-sm"></i> Cadastrar Novo Pet
                </a>
            </div>

            <div id="pets-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                </div>

            <p id="no-pets-message" class="text-center text-white font-fredoka hidden col-span-full mt-8">
                Você ainda não cadastrou nenhum pet 🐾
            </p>
        </div>
    </main>

    <div id="modal-editar" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl relative font-sans text-slate-800">
            <h3 class="font-fredoka text-2xl text-slate-900 mb-4 flex items-center gap-2">
                <i class="fa-solid fa-pen-to-square text-site-coral"></i> Editar Informações do Pet
            </h3>
            
            <form id="form-editar-pet" class="space-y-4">
                <input type="hidden" id="edit-pet-id">
                
               <div>
    <label class="block text-sm font-semibold mb-1 text-slate-700">Idade Estimada</label>
    <div class="relative">
        <select id="edit-pet-idade" class="w-full px-3 py-2 border border-slate-200 rounded-xl outline-none focus:border-site-coral appearance-none bg-white">
            <option value="" disabled selected>Selecione...</option>
            <option value="filhote">Filhote (Menos de 1 ano)</option>
            <option value="jovem">Jovem (1 a 2 anos)</option>
            <option value="adulto">Adulto (3 a 7 anos)</option>
            <option value="idoso">Idoso (Mais de 8 anos)</option>
        </select>
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-500">
            <i class="fa-solid fa-chevron-down text-xs"></i>
        </div>
    </div>
</div>

                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-700">Porte</label>
                    <select id="edit-pet-porte" class="w-full px-3 py-2 border border-slate-200 rounded-xl outline-none focus:border-site-coral">
                        <option value="pequeno">Pequeno</option>
                        <option value="médio">Médio</option>
                        <option value="grande">Grande</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-700">Localização</label>
                    <input type="text" id="edit-pet-localizacao" class="w-full px-3 py-2 border border-slate-200 rounded-xl outline-none focus:border-site-coral">
                </div>

                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-700">Sobre / Descrição</label>
                    <textarea id="edit-pet-sobre" rows="3" class="w-full px-3 py-2 border border-slate-200 rounded-xl outline-none focus:border-site-coral resize-none"></textarea>
                </div>

                <div class="bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <label class="block text-sm font-semibold mb-2 text-slate-700 flex items-center gap-1">
                        <i class="fa-solid fa-heart-circle-check text-site-coral"></i> Status do Pet
                    </label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer text-sm font-medium">
                            <input type="radio" name="edit-pet-status" value="não adotado" class="accent-site-green"> 
                            Não Adotado (Disponível)
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer text-sm font-medium">
                            <input type="radio" name="edit-pet-status" value="adotado" class="accent-site-coral"> 
                            Adotado 🎉
                        </label>
                    </div>
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="fecharModalEditar()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-2.5 rounded-xl transition-all">
                        Cancelar
                    </button>
                    <button type="submit" class="w-full bg-site-coral hover:bg-site-coral-hover text-white font-medium py-2.5 rounded-xl transition-all shadow-sm">
                        Salvar Alterações
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="meus_animais.js"></script>


    <script>
        // Elementos do Cabeçalho e Dropdown
        const userMenuBtn = document.getElementById('user-menu-btn');
        const userDropdown = document.getElementById('user-dropdown');
        const userMenuArrow = document.getElementById('user-menu-arrow');
        const btnLogout = document.getElementById('btn-logout');
        const headerUserName = document.getElementById('header-user-name');
        const headerAvatarInitials = document.getElementById('header-avatar-initials');

        // ==========================================================
        // LÓGICA DE VALIDAÇÃO DE AUTENTICAÇÃO 
        // ==========================================================
        function checarAutenticacao() {
            const usuarioLogadoString = localStorage.getItem('usuario_logado');

            if (!usuarioLogadoString) {
                console.warn("Nenhum utilizador logado detetado.");
                return false;
            }

            try {
                const usuario = JSON.parse(usuarioLogadoString);

                if (!usuario || !usuario.nome) {
                    return false;
                }

                if(headerUserName) headerUserName.textContent = usuario.nome;
                
                const partesNome = usuario.nome.trim().split(/\s+/);
                let initials = partesNome[0].charAt(0);
                if (partesNome.length > 1) {
                    initials += partesNome[partesNome.length - 1].charAt(0);
                }
                
                if(headerAvatarInitials) headerAvatarInitials.textContent = initials.toUpperCase();
                return true;

            } catch(e) {
                console.error("Erro ao ler dados da sessão:", e);
                return false;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            checarAutenticacao();
        });

        if (userMenuBtn && userDropdown) {
            userMenuBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                userDropdown.classList.toggle('hidden');
                
                if (userMenuArrow) {
                    userMenuArrow.classList.toggle('rotate-180');
                }
            });

            document.addEventListener('click', function(e) {
                if (!userMenuBtn.contains(e.target) && !userDropdown.contains(e.target)) {
                    userDropdown.classList.add('hidden');
                    if (userMenuArrow) userMenuArrow.classList.remove('rotate-180');
                }
            });

            if (btnLogout) {
                btnLogout.addEventListener('click', function() {
                    localStorage.removeItem('usuario_logado');
                    alert("Sessão encerrada!");
                    window.location.href = "login.html";
                });
            }
        }
    </script>
</body>
</html>
