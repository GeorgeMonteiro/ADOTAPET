<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdotaPet - Mensagens</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        site: {
                            green: '#93b082',
                            lightgreen: '#c3d3ba',
                            coral: '#f37676',
                            'coral-hover': '#e26363'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], fredoka: ['Fredoka', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-site-green font-sans min-h-screen text-slate-800 flex flex-col">

    <header class="bg-site-green border-b border-site-lightgreen/30 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between relative">
            <div class="flex items-center gap-6">
                <a href="pagina_explorar.html" class="font-fredoka text-xl font-medium text-white/80 hover:text-white pb-1 transition-all">Explorar pets</a>
                <a href="meus_animais.html" class="font-fredoka text-xl font-medium text-white/80 hover:text-white pb-1 transition-all">Meus pets</a>
                <a href="chatInterno.html" class="font-fredoka text-xl font-medium text-white pb-1 border-b-2 border-white">Mensagens</a>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto w-full px-4 py-6 flex-grow flex gap-4 h-[calc(100vh-100px)]">
        
        <aside class="w-1/3 bg-site-lightgreen rounded-3xl p-4 shadow-sm flex flex-col gap-3">
            <h3 class="font-fredoka text-xl font-bold text-slate-900 px-2 mb-2">Conversas</h3>
            <div class="flex-grow overflow-y-auto space-y-2 pr-1" id="lista-conversas">
                <div class="text-center text-slate-600 text-xs py-8 font-medium">Nenhuma conversa encontrada.</div>
            </div>
        </aside>

        <section class="w-2/3 bg-white rounded-3xl shadow-sm flex flex-col overflow-hidden border border-slate-100">
            
            <div class="bg-site-lightgreen/40 px-6 py-4 border-b border-slate-100 flex items-center gap-3">
                <img id="chat-foto-dono" src="https://ui-avatars.com/api/?name=%3F&background=cbd5e1&color=fff" class="w-10 h-10 rounded-full object-cover shadow-sm" alt="Foto de perfil">
                <div>
                    <h3 id="chat-titulo-nome" class="font-fredoka font-bold text-[#001730] text-lg leading-tight">Selecione uma conversa</h3>
                    <p id="chat-titulo-email" class="text-xs text-blue-900/50 font-medium">Escolha um contato ao lado para interagir</p>
                </div>
            </div>

            <div class="flex-grow p-6 overflow-y-auto space-y-4 bg-slate-50/50 flex flex-col" id="historico-mensagens">
                <div class="text-center text-slate-400 text-sm my-auto font-medium">Nenhuma conversa activa no momento.</div>
            </div>

            <form id="form-envio-chat" class="p-4 bg-white border-t border-slate-100 flex gap-3 items-center" onsubmit="enviarMensagemForm(event)">
                <input type="text" id="input-mensagem" placeholder="Digite sua mensagem aqui..." required disabled
                    class="flex-grow px-4 py-3 rounded-xl bg-slate-100 border-0 outline-none text-slate-800 focus:ring-2 focus:ring-site-coral/50 transition-all text-sm">
                <button type="submit" id="btn-enviar" disabled
                    class="bg-site-coral hover:bg-site-coral-hover text-white p-3 rounded-xl transition-colors shadow-sm flex items-center justify-center w-11 h-11">
                    <i class="fa-solid fa-paper-plane text-sm"></i>
                </button>
            </form>
        </section>
    </main>

   <script>
        // 1. CAPTURA SEGURA DA SESSÃO 
        const rawStorage = localStorage.getItem("usuario_logado");
        let usuarioLogado = {};
        
        try {
            if (rawStorage) {
                const dadosParsed = JSON.parse(rawStorage);
                usuarioLogado = dadosParsed.usuario ? dadosParsed.usuario : dadosParsed;
                console.log("Usuário logado identificado:", usuarioLogado.email);
            }
        } catch (err) {
            console.error("Erro ao ler sessão do localStorage:", err);
        }

        // Objeto global que controla o chat que está aberto na tela
        let conversaAtiva = { animalId: null, destinatarioEmail: null };
        
        // Armazena a contagem de mensagens antigas da conversa atual para gerenciar novas notificações
        let quantidadeMensagensAntigas = 0;

        function obterEmailRemetente() {
            return usuarioLogado?.email || null;
        }

        // 2. SELECIONAR OU INICIAR UMA CONVERSA
        async function selecionarConversa(animalId, destinatarioEmail, nomeInterlocutor = null) {
            // Reseta a contagem ao mudar de chat para evitar alarmes falsos de notificações
            quantidadeMensagensAntigas = 0;

            if (!animalId || !destinatarioEmail) {
                console.error("Erro ao selecionar conversa: Dados ausentes", { animalId, destinatarioEmail });
                return;
            }

            // Garante a gravação correta no objeto global com os tipos certos
            conversaAtiva.animalId = parseInt(animalId);
            conversaAtiva.destinatarioEmail = destinatarioEmail;
            
            console.log("Chat ativo definido para:", conversaAtiva);

            // Desbloqueia os elementos do formulário na tela
            const inputMsg = document.getElementById("input-mensagem");
            const btnEnviar = document.getElementById("btn-enviar");
            if (inputMsg) inputMsg.disabled = false;
            if (btnEnviar) btnEnviar.disabled = false;
            
            const elementoNome = document.getElementById("chat-titulo-nome");
            const elementoEmail = document.getElementById("chat-titulo-email");
            const elementoFoto = document.getElementById("chat-foto-dono");

            let nomeExibicao = nomeInterlocutor;
            if (!nomeExibicao) {
                const dadosDonoSalvos = JSON.parse(localStorage.getItem("dados_dono_chat_ativo"));
                if (dadosDonoSalvos && dadosDonoSalvos.email === destinatarioEmail) {
                    nomeExibicao = dadosDonoSalvos.nome;
                } else {
                    const nomeProvisorio = destinatarioEmail.split('@')[0];
                    nomeExibicao = nomeProvisorio.charAt(0).toUpperCase() + nomeProvisorio.slice(1);
                }
            }

            if (elementoNome) elementoNome.textContent = nomeExibicao;
            if (elementoEmail) elementoEmail.textContent = destinatarioEmail;
            if (elementoFoto) elementoFoto.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(nomeExibicao)}&background=random&color=fff`;

            localStorage.setItem("dados_dono_chat_ativo", JSON.stringify({
                nome: nomeExibicao,
                email: destinatarioEmail,
                foto: `https://ui-avatars.com/api/?name=${encodeURIComponent(nomeExibicao)}&background=random&color=fff`
            }));

            await carregarMensagens();
        }

        // 3. CARREGAR HISTÓRICO DE MENSAGENS
        async function carregarMensagens() {
            if (!conversaAtiva.animalId || !conversaAtiva.destinatarioEmail) return;

            const emailRemetente = obterEmailRemetente();
            if (!emailRemetente) return;

            try {
                const params = new URLSearchParams({
                    animal_id: conversaAtiva.animalId,
                    usuario1: emailRemetente,
                    usuario2: conversaAtiva.destinatarioEmail
                });

                const resposta = await fetch(`http://localhost:5001/chat/historico?${params}`);
                const container = document.getElementById("historico-mensagens");
                if (!container) return;

                if (!resposta.ok) {
                    container.innerHTML = `<div class="text-center text-slate-400 text-sm my-auto font-medium">Diga "Olá!" para iniciar a conversa com este protetor.</div>`;
                    quantidadeMensagensAntigas = 0;
                    return;
                }
                
                const mensagens = await resposta.json();
                container.innerHTML = "";

                if (!mensagens || mensagens.length === 0) {
                    container.innerHTML = `<div class="text-center text-slate-400 text-sm my-auto font-medium">Diga "Olá!" para iniciar a conversa com este protetor.</div>`;
                    quantidadeMensagensAntigas = 0;
                    return;
                }

                // === LOGICA DE DETECÇÃO DE NOTIFICAÇÕES ===
                if (mensagens.length > quantidadeMensagensAntigas && quantidadeMensagensAntigas > 0) {
                    const ultimaMsg = mensagens[mensagens.length - 1];
                    // Só emite som e alerta se o autor do último texto recebido NÃO for você mesmo
                    if (ultimaMsg.remetente !== emailRemetente) {
                        dispararNotificacaoVisual();
                    }
                }
                quantidadeMensagensAntigas = mensagens.length;

                mensagens.forEach(msg => {
                    const eMe = msg.remetente === emailRemetente;
                    const msgDiv = document.createElement("div");
                    
                    msgDiv.className = `flex flex-col max-w-[70%] ${eMe ? 'self-end items-end' : 'self-start items-start'}`;
                    msgDiv.innerHTML = `
                        <div class="px-4 py-2.5 rounded-2xl text-sm font-medium shadow-sm ${eMe ? 'bg-site-coral text-white rounded-br-none' : 'bg-white text-slate-800 rounded-bl-none border border-slate-100'}">
                            ${msg.conteudo}
                        </div>
                        <span class="text-[10px] text-gray-400 font-semibold mt-1 px-1">${msg.hora || "Agora"}</span>
                    `;
                    container.appendChild(msgDiv);
                });

                container.scrollTop = container.scrollHeight;
            } catch (err) {
                console.error("Erro ao carregar mensagens:", err);
            }
        }

        // 4. ENVIAR NOVA MENSAGEM
        async function enviarMensagemForm(e) {
            if (e) e.preventDefault(); // Impede a página de recarregar
            
            console.log("Tentando enviar mensagem...");

            const input = document.getElementById("input-mensagem");
            if (!input) return;

            const conteudo = input.value.trim();
            if (!conteudo) return;

            console.log("Conteúdo digitado:", conteudo);
            console.log("Dados de envio atuais:", conversaAtiva);
            
            if (!conversaAtiva.animalId || !conversaAtiva.destinatarioEmail) {
                console.error("Não foi possível enviar: conversaAtiva está incompleta", conversaAtiva);
                alert("Erro ao identificar a conversa atual.");
                return;
            }

            const emailRemetente = obterEmailRemetente();
            const emailDestinatario = conversaAtiva.destinatarioEmail;

            if (!emailRemetente || !emailDestinatario) {
                console.error("Erro de e-mails:", { emailRemetente, emailDestinatario });
                alert("Não foi possível identificar sua sessão ou o destinatário.");
                return;
            }

            // === ADIÇÃO VISUAL IMEDIATA NA TELA (Otimista) ===
            const container = document.getElementById("historico-mensagens");
            if (container) {
                if (container.innerHTML.includes("Diga \"Olá!\"") || container.innerHTML.includes("Nenhuma conversa")) {
                    container.innerHTML = "";
                }

                const msgDiv = document.createElement("div");
                msgDiv.className = `flex flex-col max-w-[70%] self-end items-end`;
                msgDiv.innerHTML = `
                    <div class="px-4 py-2.5 rounded-2xl text-sm font-medium shadow-sm bg-site-coral text-white rounded-br-none">
                        ${conteudo}
                    </div>
                    <span class="text-[10px] text-gray-400 font-semibold mt-1 px-1">Agora</span>
                `;
                container.appendChild(msgDiv);
                container.scrollTop = container.scrollHeight;
            }

            // Limpa o input de texto imediatamente para dar fluidez ao chat
            input.value = "";

            try {
                const resposta = await fetch("http://localhost:5001/chat/enviar", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        animal_id: parseInt(conversaAtiva.animalId),
                        remetente_email: emailRemetente,
                        destinatario_email: emailDestinatario,
                        conteudo: conteudo
                    })
                });

                if (resposta.ok) {
                    console.log("Mensagem enviada com sucesso para o banco!");
                    await carregarMensagens();
                    await carregarListaDeConversas();
                } else {
                    const erroTxt = await resposta.text();
                    console.error("Servidor recusou o envio:", erroTxt);
                    alert("O servidor não conseguiu registrar a mensagem. Verifique se o ID do pet é válido.");
                }
            } catch (err) {
                console.error("Erro na requisição POST de envio:", err);
            }
        }

        // 5. CARREGAR BARRA LATERAL DE CONVERSAS
        async function carregarListaDeConversas() {
            const emailRemetente = obterEmailRemetente();
            if (!emailRemetente) return;

            try {
                const resposta = await fetch(`http://localhost:5001/chat/lista?email=${encodeURIComponent(emailRemetente)}`);
                const listaContainer = document.getElementById("lista-conversas");
                if (!listaContainer) return;

                if (!resposta.ok) {
                    listaContainer.innerHTML = `<div class="text-center text-slate-600 text-xs py-8 font-medium">Nenhuma conversa ativa encontrada.</div>`;
                    return;
                }
                
                const conversas = await resposta.json();
                listaContainer.innerHTML = "";

                if (!conversas || conversas.length === 0) {
                    listaContainer.innerHTML = `<div class="text-center text-slate-600 text-xs py-8 font-medium">Nenhuma conversa ativa encontrada.</div>`;
                    return;
                }

                conversas.forEach(chat => {
                    const interlocutorNome = chat.outro_usuario_nome || "Protetor";
                    const interlocutorEmail = chat.outro_usuario_email;
                    const petInfo = `${chat.pet_breed || "Pet"}`;
                    
                    const itemChat = document.createElement("div");
                    const ativo = conversaAtiva.animalId === chat.animal_id && conversaAtiva.destinatarioEmail === interlocutorEmail;
                    
                    itemChat.className = `p-3 rounded-2xl cursor-pointer transition-all flex items-center gap-3 ${ativo ? 'bg-white shadow-sm border border-slate-200/50' : 'hover:bg-white/50'}`;
                    
                    const fotoUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(interlocutorNome)}&background=random&color=fff`;

                    itemChat.innerHTML = `
                        <img src="${fotoUrl}" class="w-10 h-10 rounded-full object-cover shadow-sm" alt="Avatar">
                        <div class="flex-grow min-w-0">
                            <div class="flex justify-between items-baseline">
                                <h4 class="font-fredoka font-bold text-slate-900 text-sm truncate">${interlocutorNome}</h4>
                                <span class="text-[10px] text-slate-500 font-bold bg-site-coral/20 px-1.5 py-0.5 rounded-full">${petInfo}</span>
                            </div>
                            <p class="text-xs text-slate-600 truncate">${chat.ultima_mensagem || "Clique para abrir o chat"}</p>
                        </div>
                    `;

                    itemChat.addEventListener("click", async () => {
                        await selecionarConversa(chat.animal_id, interlocutorEmail, interlocutorNome);
                    });

                    listaContainer.appendChild(itemChat);
                });

            } catch (err) {
                console.error("Erro na lista de conversas:", err);
            }
        }

        // EFEITO DE NOTIFICAÇÃO VISUAL (PISCAR ABA) E SONORA (AUDIO CONTEXT SINE)
        function dispararNotificacaoVisual() {
            // Emitir som sutil sintetizado nativamente pelo próprio navegador
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx) {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = "sine";
                    osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); // Nota Ré (D5)
                    osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.1); // Nota Lá (A5)
                    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.25);
                }
            } catch (soundErr) {
                console.log("AudioContext bloqueado ou não suportado:", soundErr);
            }

            // Alternar temporariamente o título da aba do navegador para prender a atenção do usuário
            const tituloOriginal = document.title;
            document.title = "💬 Nova Mensagem!";
            
            setTimeout(() => {
                document.title = tituloOriginal;
            }, 3000);
        }

        // 6. INICIALIZAÇÃO DA PÁGINA
        window.addEventListener("DOMContentLoaded", async () => {
            await carregarListaDeConversas();

            const urlParams = new URLSearchParams(window.location.search);
            const animalIdParam = urlParams.get("id");
            const donoEmailParam = urlParams.get("dono");

            console.log("Parâmetros detectados na URL:", { id: animalIdParam, dono: donoEmailParam });

            if (animalIdParam && donoEmailParam) {
                await selecionarConversa(animalIdParam, donoEmailParam);
            }
        });

        // Atualizações assíncronas em segundo plano (polling)
        setInterval(() => {
            if (conversaAtiva.animalId && conversaAtiva.destinatarioEmail) {
                carregarMensagens();
            }
        }, 3000);

        setInterval(() => {
            carregarListaDeConversas();
        }, 5000);
    </script>
</body>
</html>
