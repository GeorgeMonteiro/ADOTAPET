<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdotaPet - Mensagens</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        site: {
                            green: '#93b082',
                            lightgreen: '#c3d3ba',
                            coral: '#f37676',
                            'coral-hover': '#e26363'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], fredoka: ['Fredoka', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="bg-site-green font-sans min-h-screen text-slate-800 flex flex-col">

    <!-- HEADER IGUAL AO PERFIL_DASHBOARD -->
    <header class="bg-site-green border-b border-site-lightgreen/30 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between relative">
            <div class="flex items-center gap-6">
                <a href="pagina_explorar.html" class="font-fredoka text-xl font-medium text-white/80 hover:text-white pb-1 transition-all">Explorar pets</a>
                <a href="meus_animais.html" class="font-fredoka text-xl font-medium text-white/80 hover:text-white pb-1 transition-all">Meus pets</a>
                <a href="mensagens.html" class="font-fredoka text-xl font-medium text-white pb-1 border-b-2 border-white">Mensagens</a>
            </div>
        </div>
    </header>

    <!-- CONTAINER DO CHAT -->
    <main class="max-w-6xl mx-auto w-full px-4 py-6 flex-grow flex gap-4 h-[calc(100vh-100px)]">
        
        <!-- Lista de Conversas (Esquerda) -->
        <aside class="w-1/3 bg-site-lightgreen rounded-3xl p-4 shadow-sm flex flex-col gap-3">
            <h3 class="font-fredoka text-xl font-bold text-slate-900 px-2 mb-2">Conversas</h3>
            <div class="flex-grow overflow-y-auto space-y-2 pr-1" id="lista-conversas">
                <!-- As conversas dinâmicas entrarão aqui via JavaScript -->
                <div class="text-center text-slate-600 text-xs py-8 font-medium">Nenhuma conversa encontrada.</div>
            </div>
        </aside>

        <!-- Janela de Chat Aberta (Direita) -->
        <section class="w-2/3 bg-white rounded-3xl shadow-sm flex flex-col overflow-hidden border border-slate-100">
            <!-- Cabeçalho do Chat -->
            <div class="bg-site-lightgreen/40 px-6 py-4 border-b border-slate-100 flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-slate-300 flex items-center justify-center text-white font-fredoka font-bold" id="chat-avatar">?</div>
                <div>
                    <h3 class="font-fredoka text-lg font-bold text-slate-900" id="chat-titulo-pet">Selecione uma conversa</h3>
                    <p class="text-xs text-slate-500 font-medium" id="chat-subtitulo">Escolha um contato ao lado para interagir</p>
                </div>
            </div>

            <!-- Área de Mensagens -->
            <div class="flex-grow p-6 overflow-y-auto space-y-4 bg-slate-50/50 flex flex-col" id="historico-mensagens">
                <div class="text-center text-slate-400 text-sm my-auto font-medium">Nenhuma conversa ativa no momento.</div>
            </div>

            <!-- Campo de Envio de Texto -->
            <form id="form-envio-chat" class="p-4 bg-white border-t border-slate-100 flex gap-3 items-center" onsubmit="enviarMensagemForm(event)">
                <input type="text" id="input-mensagem" placeholder="Digite sua mensagem aqui..." required disabled
                    class="flex-grow px-4 py-3 rounded-xl bg-slate-100 border-0 outline-none text-slate-800 focus:ring-2 focus:ring-site-coral/50 transition-all text-sm">
                <button type="submit" id="btn-enviar" disabled
                    class="bg-site-coral hover:bg-site-coral-hover text-white p-3 rounded-xl transition-colors shadow-sm flex items-center justify-center w-11 h-11">
                    <i class="fa-solid fa-paper-plane text-sm"></i>
                </button>
            </form>
        </section>
    </main>

    <script>
        const usuarioLogado = JSON.parse(localStorage.getItem("usuario_logado"))?.usuario || JSON.parse(localStorage.getItem("usuario_logado"));
        let conversaAtiva = { animalId: null, destinatarioEmail: null };

        async function selecionarConversa(animalId, destinatarioEmail) {
            conversaAtiva = { animalId, destinatarioEmail };
            
            document.getElementById("input-mensagem").disabled = false;
            document.getElementById("btn-enviar").disabled = false;
            document.getElementById("chat-titulo-pet").textContent = "Chat de Adoção";
            document.getElementById("chat-subtitulo").textContent = destinatarioEmail;
            document.getElementById("chat-avatar").textContent = destinatarioEmail.charAt(0).toUpperCase();

            await carregarMensagens();
        }

        async function carregarMensagens() {
            if (!conversaAtiva.animalId) return;

            try {
                const params = new URLSearchParams({
                    animal_id: conversaAtiva.animalId,
                    usuario1: usuarioLogado.email,
                    usuario2: conversaAtiva.destinatarioEmail
                });

                const resposta = await fetch(`http://localhost:5001/chat/historico?${params}`);
                const mensagens = await resposta.json();

                const container = document.getElementById("historico-mensagens");
                container.innerHTML = "";

                if(mensagens.length === 0) {
                    container.innerHTML = `<div class="text-center text-slate-400 text-sm my-auto font-medium">Diga "Olá!" para iniciar a conversa.</div>`;
                    return;
                }

                mensagens.forEach(msg => {
                    const eMe = msg.remetente === usuarioLogado.email;
                    const msgDiv = document.createElement("div");
                    
                    msgDiv.className = `flex flex-col max-w-[70%] ${eMe ? 'self-end items-end' : 'self-start items-start'}`;
                    msgDiv.innerHTML = `
                        <div class="px-4 py-2.5 rounded-2xl text-sm font-medium shadow-sm ${eMe ? 'bg-site-coral text-white rounded-br-none' : 'bg-white text-slate-800 rounded-bl-none border border-slate-100'}">
                            ${msg.conteudo}
                        </div>
                        <span class="text-[10px] text-gray-400 font-semibold mt-1 px-1">${msg.hora}</span>
                    `;
                    container.appendChild(msgDiv);
                });

                container.scrollTop = container.scrollHeight;
            } catch (err) {
                console.error("Erro ao carregar mensagens:", err);
            }
        }

        async function enviarMensagemForm(e) {
            e.preventDefault();
            const input = document.getElementById("input-mensagem");
            const conteudo = input.value.trim();
            if (!conteudo) return;

            try {
                const resposta = await fetch("http://localhost:5001/chat/enviar", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        animal_id: conversaAtiva.animalId,
                        remetente_email: usuarioLogado.email,
                        destinatario_email: conversaAtiva.destinatarioEmail,
                        conteudo: conteudo
                    })
                });

                if (resposta.ok) {
                    input.value = "";
                    await carregarMensagens();
                }
            } catch (err) {
                console.error("Erro ao enviar:", err);
            }
        }

        setInterval(() => {
            if (conversaAtiva.animalId) carregarMensagens();
        }, 3000);

        
        window.addEventListener("DOMContentLoaded", async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const animalIdParam = urlParams.get("id");
            const donoEmailParam = urlParams.get("dono");

            // 2. Se houver um redirecionamento vindo de um pet, abre o chat direto
            if (animalIdParam && donoEmailParam) {
                const animalId = parseInt(animalIdParam);
                
                // Ativa visualmente a conversa
                await selecionarConversa(animalId, donoEmailParam);
            }
            
            carregarListaDeConversas();
        });

        async function carregarListaDeConversas() {
            // Função para buscar no banco todas as conversas que o usuário logado possui
            console.log("Carregando lista de chats de:", usuarioLogado.email);
        }
    </script>
</body>
</html>
