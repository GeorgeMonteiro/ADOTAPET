<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AdotaPet - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <nav>
            <a href="index.html">início</a>
            <a href="#">sobre nós</a>
            <a href="#">animais para Adoção</a>
        </nav>
        <button class="btn-header" onclick="location.href='cadastro.html'">Criar uma conta</button>
    </header>

    <main class="container">
        <section class="card">
            <h2>Login</h2>
            <form id="loginForm" action="#">
                <div class="input-group">
                    <label>E-mail:</label>
                    <input type="email" id="emailLogin" required>
                </div>
                <div class="input-group">
                    <label>Senha:</label>
                    <input type="password" id="senhaLogin" required>
                </div>
                <button type="submit" class="btn-submit">Entrar</button>
            </form>
            <p class="footer-text">Novo por aqui? <a href="cadastro.html" class="link-highlight">Cadastre agora</a></p>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
