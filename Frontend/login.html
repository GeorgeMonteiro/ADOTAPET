<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdotaPet - Login</title>
    <link rel="stylesheet" href="style.css">

    <!-- Google reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <header class="navbar">
        <nav>
            <a href="index.html">início</a>
            <a href="#">sobre nós</a>
            <a href="#">animais para adoção</a>
        </nav>
        <button class="btn-header" onclick="location.href='cadastro.html'">Criar uma conta</button>
    </header>

    <main class="container">
        <div class="card">
            <h2>Login</h2>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">E-mail:</label>
                    <input type="email" id="emailLogin" placeholder="Digite seu e-mail" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senhaLogin" placeholder="Digite sua senha" required>
                </div>

                <!-- reCAPTCHA (Chave de teste oficial do Google) -->
                <div class="g-recaptcha"
                     data-sitekey="6LeIxAcTAAAAAJcZVRqyHh71UMIEGNQ_MXjiZKhI">
                </div>

                <button type="submit" class="btn-submit">Entrar</button>
            </form>

            <p class="footer-text">
                Novo por aqui?
                <a href="cadastro.html" class="link-highlight">Cadastre agora</a>
            </p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
