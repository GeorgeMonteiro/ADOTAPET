<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AdotaPet - Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <nav>
            <a href="index.html">início</a>
            <a href="#">sobre nós</a>
            <a href="#">animais para Adoção</a>
        </nav>
        <button class="btn-header">Criar uma conta</button>
    </header>

    <main class="container">
        <section class="card">
            <h2>Seja muito bem-vindo (a)!</h2>
            <form id="cadastroForm" action="#">
                <div class="input-group">
                    <label>Nome:</label>
                    <input type="text" id="nome"  required>
                </div>
                <div class="input-group">
                    <label>E-mail:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="input-group">
                    <label>Senha:</label>
                    <input type="password" id="senha" required>
                </div>
                <button type="submit" class="btn-submit">Cadastrar</button>
            </form>
            <p class="footer-text">Já tem uma conta? <a href="login.html" class="link-highlight">Faça login</a></p>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
